<!doctype html>
<html lang="ca">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HOSOM — Demo Sant Cugat</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
      body { font-family: system-ui, Arial, sans-serif; margin: 0; }
      header { padding: 16px; border-bottom: 1px solid #ddd; }
      .wrap { display: grid; grid-template-columns: 360px 1fr; min-height: calc(100vh - 57px); }
      .left { border-right: 1px solid #ddd; padding: 12px; }
      .right { padding: 16px; }

      input[type="search"] { width: 100%; padding: 10px; font-size: 14px; }

      .list { margin-top: 10px; }
      .row { display: flex; align-items: center; gap: 8px; padding: 6px 4px; }

      .toggle {
        width: 28px; height: 28px;
        border: 1px solid #ccc; border-radius: 8px;
        background: white; cursor: pointer;
      }
      .toggle:disabled { cursor: default; opacity: 0.5; }

      .enter {
        flex: 1; text-align: left;
        border: 1px solid #eee; background: #fafafa;
        border-radius: 10px; padding: 8px 10px;
        cursor: pointer;
      }

      .indent-0 { padding-left: 0px; }
      .indent-1 { padding-left: 14px; }
      .indent-2 { padding-left: 28px; }

      .muted { color: #666; font-size: 12px; margin-top: 6px; }
      .pill { display: inline-block; padding: 2px 8px; border: 1px solid #ddd; border-radius: 999px; font-size: 12px; }

      .card { border: 1px solid #eee; border-radius: 14px; padding: 14px; background: white; }
      .title { font-size: 20px; margin: 0 0 8px 0; }
      .breadcrumbs { font-size: 13px; color: #444; margin-bottom: 10px; }
      .bigbtn { padding: 10px 12px; border: 1px solid #ddd; background: #f6f6f6; border-radius: 12px; cursor: pointer; }
    </style>
  </head>

  <body>
    <header>
      <strong>HOSOM</strong> · Xarxa social territorial
      <div class="muted">Demo: territoris clicables + cercador</div>
    </header>

    <main class="wrap">
      <aside class="left">
        <label for="search" class="muted">Cerca un territori</label>
        <input id="search" type="search" placeholder="Exemple: Terrassa, La Floresta, Sabadell..." />

        <div id="searchResults" class="list"></div>

        <hr style="margin: 14px 0; border: none; border-top: 1px solid #eee;" />

        <div class="muted">Arbre territorial</div>
        <div id="tree" class="list"></div>
      </aside>

    <section class="right">
      <div class="card">
        <div class="breadcrumbs" id="breadcrumbs">Carregant...</div>
        <h1 class="title" id="viewTitle">Carregant...</h1>
        <div id="viewMeta" class="muted"></div>

        <div style="margin-top: 12px;">
          <button id="enterChat" class="bigbtn">Entrar al xat (demo)</button>
        </div>

        <div class="muted" style="margin-top: 10px;">
          (Més endavant aquest botó obrirà l’espai de xat real.)
        </div>

        <!-- 🔎 BUSCADOR DE ADJETIVOS -->
        <hr style="margin: 20px 0; border: none; border-top: 1px solid #eee;" />

        <div class="search">
          <label class="muted">Cercador d'adjectius</label>
          <input 
            id="adjSearch" 
            type="text" 
            placeholder="Escriu un adjectiu… (mínim 2 lletres)" 
          />
        </div>

        <div id="results" class="list" style="margin-top: 10px;"></div>

      </div>
    </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
